services:
  - type: web
    name: verifyx-backend
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT --timeout 120 --graceful-timeout 30"
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: "https://ai-fake-news2.vercel.app"
      - key: ALLOWED_ORIGINS
        value: "https://ai-fake-news2.vercel.app"
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: TESSDATA_PREFIX
        value: "/usr/share/tesseract-ocr/5/tessdata"
